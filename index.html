<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    
    <meta property="og:title" content="مبروك! حوالة عيدية واردة لك 💸">
    <meta property="og:description" content="لقد أرسل لك فيصل حوالة مالية عبر STC Pay بمناسبة العيد. اضغط هنا لتأكيد الاستلام وإيداع المبلغ في حسابك فوراً.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1620714223084-8fcacc6dfd8d?q=80&w=1200&auto=format&fit=crop"> 
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="مبروك! حوالة عيدية واردة لك 💸">
    <meta name="twitter:description" content="اضغط هنا لتأكيد استلام عيدية فيصل وإيداعها في حسابك.">

    <title>استلام العيدية</title>
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: "Tahoma", "Arial", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 85dvh; 
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .chat-header {
            background-color: #0f172a; 
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: background-color 0.3s;
            flex-shrink: 0;
        }

        .chat-header.overload {
            background-color: #7f1d1d; 
        }

        .chat-header h1 {
            margin: 0;
            font-size: 18px;
        }

        .chat-header p {
            margin: 5px 0 0;
            font-size: 11px;
            color: #94a3b8;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f8fafc; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease-in-out;
        }

        .wrapper-ai { align-self: flex-start; }
        .wrapper-user { align-self: flex-end; }

        .message {
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-ai {
            background-color: white;
            color: #333;
            border-bottom-right-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .msg-error {
            background-color: #fef2f2;
            color: #991b1b;
            border-bottom-right-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            border: 1px solid #fca5a5;
            font-weight: bold;
        }

        .msg-user {
            background-color: #3b82f6; 
            color: white;
            border-bottom-left-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .timestamp {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
            text-align: left;
        }

        /* The visually offensive fake Captcha */
        .captcha-box {
            background: repeating-linear-gradient(45deg, #d1d5db, #d1d5db 5px, #f3f4f6 5px, #f3f4f6 10px);
            padding: 15px;
            margin-top: 10px;
            text-align: center;
            font-size: 28px;
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            color: #1f2937;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            user-select: none; /* Prevents copy-pasting */
            border: 2px solid #9ca3af;
            border-radius: 8px;
            transform: skew(-5deg) rotate(2deg);
            filter: blur(0.8px);
            letter-spacing: 4px;
            overflow: hidden;
            word-wrap: break-word;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        .chat-input-area input:disabled {
            background-color: #e2e8f0;
            cursor: not-allowed;
            color: #64748b;
        }

        .chat-input-area button {
            background-color: #0f172a;
            color: white;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            margin-right: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input-area button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .chat-input-area button:hover:not(:disabled) {
            background-color: #1e293b;
        }

        .typing-indicator {
            font-size: 12px;
            color: #64748b;
            align-self: flex-start;
            margin-left: 10px;
            display: none;
        }

        .system-notice {
            max-width: 450px;
            margin-top: 15px;
            background-color: #e2e8f0;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            color: #475569;
            line-height: 1.5;
            border: 1px dashed #94a3b8;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header" id="chatHeader">
            <h1>روبوت استلام العيدية 🤖</h1>
            <p id="headerStatus">بوابة STC Pay الآلية الآمنة</p>
        </div>

        <div class="chat-box" id="chatBox">
            </div>

        <div class="typing-indicator" id="typingIndicator">النظام يكتب الآن...</div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="اكتب هنا..." onkeypress="handleKeyPress(event)" autofocus>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div class="system-notice">
        <strong>تنويه للنظام:</strong> هذه الصفحة تم إنشاؤها لتوفير العناء عليكم. فيصل بخير، لكنه يمارس طقوس العيد (الدوام). من العايدين والفايزين!
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const typingIndicator = document.getElementById("typingIndicator");
        const headerStatus = document.getElementById("headerStatus");
        const chatHeader = document.getElementById("chatHeader");

        // Chat flow state machine
        let step = 0; 
        // 0 = Awaiting phone number
        // 1 = Awaiting Captcha 1
        // 2 = Awaiting Captcha 2

        function initChat() {
            // First message: Formal greeting
            addMessage("كل عام وانتم بخير، تقبل الله صيامكم وطاعاتكم 🌹", "msg-ai", "wrapper-ai");
            
            // Second message: The bait (1.5 seconds later)
            typingIndicator.style.display = "block";
            setTimeout(() => {
                typingIndicator.style.display = "none";
                addMessage("لاستلام عيدية فيصل عبر STC Pay، يرجى إدخال رقم جوالك المسجل بالخدمة 💸👇", "msg-ai", "wrapper-ai");
            }, 1500);
        }

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
        }

        userInput.addEventListener("focus", scrollToBottom);

        function handleKeyPress(event) {
            if (event.key === "Enter" && !userInput.disabled) {
                sendMessage();
            }
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            addMessage(text, "msg-user", "wrapper-user");
            userInput.value = "";
            userInput.focus();

            typingIndicator.style.display = "block";
            scrollToBottom();

            setTimeout(() => {
                typingIndicator.style.display = "none";
                
                if (step === 0) {
                    // They entered a phone number -> Hit them with Captcha 1
                    addMessage("جاري المعالجة... يرجى التحقق من أنك إنسان لحماية الخوادم. اكتب الرمز الموجود في الصورة بدقة:", "msg-ai", "wrapper-ai");
                    // Impossible Captcha 1 (Zalgo text + Greek letters + symbols)
                    addMessage("<div class='captcha-box'>W̸̡̨̛8𒈙Δp꧅</div>", "msg-ai", "wrapper-ai");
                    step++;
                } 
                else if (step === 1) {
                    // They tried Captcha 1 -> Fail them, give Captcha 2
                    addMessage("❌ الرمز غير صحيح! هذه محاولتك الأخيرة قبل حظر الحساب. ادخل الرمز التالي بعناية فائقة:", "msg-error", "wrapper-ai");
                    // Impossible Captcha 2 (Upside down, overlapping, zero logic)
                    addMessage("<div class='captcha-box' style='letter-spacing: -3px; transform: skew(10deg) rotate(-3deg);'>§⌘﷼﷽Ω∰!</div>", "msg-ai", "wrapper-ai");
                    step++;
                } 
                else if (step === 2) {
                    // They tried Captcha 2 -> Crash the system
                    addMessage("🛑 Fatal Error: فشل التحقق المتكرر! تم رصد هجوم (DDoS Attack) من جهازك.", "msg-error", "wrapper-ai");
                    addMessage("السيرفرات طاحت. الكلستر انضرب. فيصل بيضطر يترك شغله الحين عشان يسوي ريستارت للنظام بسببك! المحادثة أغلقت نهائياً.", "msg-error", "wrapper-ai");
                    
                    // Lock down the UI
                    userInput.disabled = true;
                    sendBtn.disabled = true;
                    userInput.placeholder = "السيرفر طاح (Server Down)";
                    chatHeader.classList.add("overload");
                    headerStatus.innerText = "❌ النظام معطل بالكامل";
                    
                    // Prevent further steps just in case
                    step++;
                }

            }, Math.random() * 1000 + 1000); // 1-2 second delay for realism
        }

        function addMessage(text, msgClass, wrapperClass) {
            const wrapperDiv = document.createElement("div");
            wrapperDiv.className = `message-wrapper ${wrapperClass}`;

            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${msgClass}`;
            msgDiv.innerHTML = text;

            const timeDiv = document.createElement("div");
            timeDiv.className = "timestamp";
            timeDiv.innerText = getCurrentTime();

            wrapperDiv.appendChild(msgDiv);
            wrapperDiv.appendChild(timeDiv);

            chatBox.appendChild(wrapperDiv);
            scrollToBottom();
        }

        window.onload = initChat;
    </script>
</body>
</html>
